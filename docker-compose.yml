version: '3.8'
services:
  visualizer:
    build: ./visualizer
    ports:
      - "4000:4000"
    volumes:
      - ./visualizer/data:/app/data
  miner:
    build: ./miner
    environment:
      - VISUALIZER_URL=http://visualizer:4000/events
      - PROCESSED_FILE=/app/state/processed.json
    volumes:
      - ./miner/state:/app/state
    depends_on:
      - visualizer